name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  api-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e "./services/api[dev]"
      - name: Run tests
        run: pytest services/api/tests/ -v

  api-lint:
    name: Backend type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e "./services/api[dev]"
      - name: Run mypy
        run: mypy --config-file services/api/pyproject.toml services/api/app/

  api-security:
    name: Backend security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e "./services/api[dev]"
      - name: Run bandit
        run: bandit -c services/api/pyproject.toml -r services/api/app/ --confidence-level high
      - name: Run uv audit
        run: uv audit --directory services/api
