included:
  - apps/ios/MTGScannerKit/Sources
  - apps/ios/MTGScannerKit/Tests
  - apps/ios/MTGScanner/App

excluded:
  - .build
  - DerivedData
  - apps/ios/MTGScannerKit/.build

opt_in_rules:
  - closure_body_length
  - force_unwrapping
  - weak_delegate

disabled_rules:
  - todo

identifier_name:
  min_length: 1

function_body_length:
  warning: 40
  error: 60

function_parameter_count:
  warning: 6
  error: 8

closure_body_length:
  warning: 40
  error: 60

file_length:
  warning: 500
  error: 700
  ignore_comment_only_lines: true

nesting:
  type_level: 3
  function_level: 3

force_unwrapping:
  severity: error

line_length:
  warning: 120
  error: 200
  ignores_comments: true

type_body_length:
  warning: 300
  error: 500
